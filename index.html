<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Striver's A2Z DSA Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #080b0f;
    --surface: #0d1117;
    --surface2: #161b22;
    --surface3: #1c2128;
    --border: #21262d;
    --border2: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --text3: #484f58;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --orange: #ffa657;
    --teal: #39d353;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    overflow-x: hidden;
  }
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* ── TOPBAR ── */
  #topbar {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,11,15,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 54px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, #1f6feb, #388bfd);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .logo-text { font-size: 15px; font-weight: 800; color: var(--text); letter-spacing: -0.02em; }
  .logo-sub { font-size: 11px; color: var(--text3); font-weight: 500; font-family: 'JetBrains Mono', monospace; }
  #back-btn {
    display: none; align-items: center; gap: 6px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text2); padding: 5px 12px; border-radius: var(--radius);
    cursor: pointer; font-family: inherit; font-size: 13px; font-weight: 600;
    transition: all 0.15s;
  }
  #back-btn:hover { background: var(--surface3); color: var(--text); border-color: var(--border2); }
  .header-progress {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 6px 14px;
  }
  .prog-bar-wrap { width: 100px; background: var(--surface3); border-radius: 999px; height: 5px; overflow: hidden; }
  .prog-bar-fill {
    height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, #1f6feb, #388bfd, #58a6ff);
    transition: width 0.5s ease;
  }
  .prog-label { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); font-weight: 600; }
  .prog-count { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3); }

  /* ── MAIN WRAP ── */
  #main { max-width: 1060px; margin: 0 auto; padding: 20px 16px 100px; }

  /* ── FILTER BAR ── */
  #filter-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 16px;
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .search-wrap { position: relative; flex: 1; min-width: 160px; }
  .search-wrap::before {
    content: '⌕'; position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    color: var(--text3); font-size: 16px; pointer-events: none;
  }
  #search-input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 10px 7px 30px;
    color: var(--text); font-size: 13px; font-family: inherit; outline: none;
    transition: border-color 0.15s;
  }
  #search-input:focus { border-color: var(--accent); }
  #search-input::placeholder { color: var(--text3); }
  .filter-group { display: flex; gap: 5px; flex-wrap: wrap; }
  .fbtn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text3); padding: 5px 11px; border-radius: 6px;
    cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 600;
    transition: all 0.15s; white-space: nowrap;
  }
  .fbtn:hover { border-color: var(--border2); color: var(--text2); }
  .fbtn.active-easy    { background: #0d2f1a; border-color: #238636; color: #3fb950; }
  .fbtn.active-medium  { background: #2d1f00; border-color: #9e6a03; color: #e3b341; }
  .fbtn.active-hard    { background: #3d0000; border-color: #da3633; color: #f85149; }
  .fbtn.active-pattern { background: #1e0d3d; border-color: #6e40c9; color: #bc8cff; }
  .fbtn.active-theory  { background: #001c3d; border-color: #1f6feb; color: #58a6ff; }
  .fbtn.active-all     { background: #0c2444; border-color: #1f6feb; color: #58a6ff; }
  .fbtn.active-lc      { background: #2d1a00; border-color: #d68910; color: #ffa657; }
  .fbtn.active-gfg     { background: #0d2f0d; border-color: #238636; color: #3fb950; }
  .fbtn.active-cn      { background: #1a1a2e; border-color: #6e40c9; color: #bc8cff; }
  .fbtn.active-plat-all { background: #0c2444; border-color: #1f6feb; color: #58a6ff; }
  .fbtn.active-undone  { background: #2d1800; border-color: #9e6a03; color: #e3b341; }
  #reset-btn { display: none; }
  #reset-btn.visible { display: block; }
  #reset-btn.fbtn { color: var(--red); }
  #reset-btn.fbtn:hover { background: #3d0000; border-color: var(--red); }

  /* ── STATS ROW ── */
  #stats-row {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 10px; margin-bottom: 16px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 12px 14px;
  }
  .stat-num { font-size: 24px; font-weight: 800; line-height: 1; margin-bottom: 3px; font-family: 'JetBrains Mono', monospace; }
  .stat-lbl { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }

  /* ── STEP GRID ── */
  #step-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(275px, 1fr)); gap: 10px; }
  .step-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 15px;
    cursor: pointer; transition: transform 0.18s, border-color 0.18s, box-shadow 0.18s;
    position: relative; overflow: hidden;
  }
  .step-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: var(--step-color, #58a6ff);
  }
  .step-card:hover { transform: translateY(-3px); border-color: var(--border2); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .step-card.complete { box-shadow: 0 0 0 1px color-mix(in srgb, var(--step-color) 30%, transparent); }
  .sc-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 12px; }
  .sc-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
    background: color-mix(in srgb, var(--step-color) 15%, transparent);
  }
  .sc-meta { flex: 1; padding-left: 10px; }
  .sc-stepnum { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 2px; color: var(--step-color); font-family: 'JetBrains Mono', monospace; }
  .sc-title { font-size: 13px; font-weight: 700; color: var(--text); line-height: 1.35; }
  .sc-trophy { font-size: 18px; }
  .sc-prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .sc-prog-nums { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .sc-pct { font-size: 12px; font-weight: 700; color: var(--step-color); font-family: 'JetBrains Mono', monospace; }
  .sc-bar { background: var(--surface3); border-radius: 999px; height: 4px; overflow: hidden; margin-bottom: 10px; }
  .sc-bar-fill { height: 100%; border-radius: 999px; background: var(--step-color); transition: width 0.4s ease; }
  .sc-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .sc-tag {
    font-size: 10px; color: var(--text3); background: var(--surface3);
    padding: 2px 7px; border-radius: 4px; border: 1px solid var(--border);
    max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }

  /* ── STEP DETAIL ── */
  #step-detail { display: none; }
  .step-header {
    background: var(--surface); border: 1px solid var(--border);
    border-left: 3px solid var(--step-color, #58a6ff);
    border-radius: var(--radius); padding: 14px 18px;
    display: flex; align-items: center; gap: 14px; margin-bottom: 14px;
  }
  .sh-icon { font-size: 28px; }
  .sh-info { flex: 1; }
  .sh-title { font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
  .sh-sub { display: flex; align-items: center; gap: 12px; }
  .sh-count { font-size: 12px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }
  .sh-bar-wrap { width: 130px; background: var(--surface3); border-radius: 999px; height: 5px; overflow: hidden; }
  .sh-bar-fill { height: 100%; border-radius: 999px; transition: width 0.4s; }
  .sh-pct { font-size: 13px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }

  /* ── SECTION ── */
  .section-block { margin-bottom: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; cursor: pointer; background: var(--surface2);
    border-bottom: 1px solid transparent; user-select: none;
    transition: background 0.12s;
  }
  .section-head:hover { background: var(--surface3); }
  .section-head.open { border-bottom-color: var(--border); }
  .sh-left { display: flex; align-items: center; gap: 8px; }
  .sh-arrow { font-size: 10px; color: var(--text3); transition: transform 0.2s; width: 12px; text-align: center; }
  .sh-arrow.open { transform: rotate(90deg); }
  .sec-name { font-size: 13px; font-weight: 600; color: var(--text2); }
  .sec-count-badge {
    font-size: 10px; background: var(--surface3); border: 1px solid var(--border);
    border-radius: 4px; padding: 1px 6px; color: var(--text3);
    font-family: 'JetBrains Mono', monospace;
  }
  .sh-right { display: flex; align-items: center; gap: 8px; }
  .sec-done-label { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: var(--text3); }
  .sec-done-label.all { color: var(--green); }
  .sec-mini-bar { width: 55px; background: var(--surface3); border-radius: 999px; height: 3px; overflow: hidden; }
  .sec-mini-fill { height: 100%; border-radius: 999px; transition: width 0.3s; }

  /* ── QUESTION TABLE ── */
  .q-table { width: 100%; border-collapse: collapse; }
  .q-table th {
    padding: 7px 10px; text-align: left; font-size: 10px; font-weight: 600;
    color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase;
    border-bottom: 1px solid var(--border); background: var(--surface);
  }
  .q-table th.center { text-align: center; }
  .q-row { cursor: pointer; transition: background 0.1s; }
  .q-row:hover td { background: rgba(255,255,255,0.025) !important; }
  .q-row td {
    padding: 9px 10px; border-bottom: 1px solid var(--border);
    background: transparent; vertical-align: middle;
  }
  .q-row.done td { background: rgba(255,255,255,0.01); }
  .q-num { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; text-align: center; width: 36px; }
  .q-check { text-align: center; width: 38px; }
  .q-check input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
  .q-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .q-row.done .q-name { color: var(--text3); text-decoration: line-through; }
  .q-link {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; color: var(--accent);
    text-decoration: none; padding: 2px 7px; border-radius: 4px;
    border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    background: color-mix(in srgb, var(--accent) 8%, transparent);
    transition: all 0.15s; white-space: nowrap; font-family: 'JetBrains Mono', monospace;
  }
  .q-link:hover { background: color-mix(in srgb, var(--accent) 18%, transparent); color: #fff; }
  .q-link.gfg { color: var(--green); border-color: color-mix(in srgb, var(--green) 30%, transparent); background: color-mix(in srgb, var(--green) 8%, transparent); }
  .q-link.gfg:hover { background: color-mix(in srgb, var(--green) 18%, transparent); }
  .q-link.cn  { color: var(--purple); border-color: color-mix(in srgb, var(--purple) 30%, transparent); background: color-mix(in srgb, var(--purple) 8%, transparent); }
  .q-link.cn:hover { background: color-mix(in srgb, var(--purple) 18%, transparent); }
  .q-link.multi { color: var(--orange); border-color: color-mix(in srgb, var(--orange) 30%, transparent); background: color-mix(in srgb, var(--orange) 8%, transparent); }
  .q-link.multi:hover { background: color-mix(in srgb, var(--orange) 18%, transparent); }
  .diff-chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace; white-space: nowrap;
  }
  .diff-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .diff-Easy    { background: #0d2f1a; color: #3fb950; border: 1px solid #238636; }
  .diff-Easy .diff-dot    { background: #3fb950; }
  .diff-Medium  { background: #2d1f00; color: #e3b341; border: 1px solid #9e6a03; }
  .diff-Medium .diff-dot  { background: #e3b341; }
  .diff-Hard    { background: #3d0000; color: #f85149; border: 1px solid #da3633; }
  .diff-Hard .diff-dot    { background: #f85149; }
  .diff-Pattern { background: #1e0d3d; color: #bc8cff; border: 1px solid #6e40c9; }
  .diff-Pattern .diff-dot { background: #bc8cff; }
  .diff-Theory  { background: #001c3d; color: #58a6ff; border: 1px solid #1f6feb; }
  .diff-Theory .diff-dot  { background: #58a6ff; }

  /* ── SEARCH RESULTS ── */
  #search-results { display: none; }
  #search-results.visible { display: block; }
  .sr-header {
    padding: 10px 14px; background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    border-bottom: none; font-size: 13px; color: var(--text3);
  }
  .sr-header strong { color: var(--text); }
  #sr-table-wrap {
    background: var(--surface); border: 1px solid var(--border);
    border-top: none; border-radius: 0 0 var(--radius) var(--radius); overflow: hidden;
  }
  .sr-empty { padding: 48px 0; text-align: center; color: var(--text3); font-size: 13px; }

  /* ── BOTTOM PROGRESS ── */
  #bottom-bar {
    display: none; position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    background: rgba(8,11,15,0.96); backdrop-filter: blur(16px);
    border: 1px solid var(--border2); border-radius: 999px;
    padding: 9px 22px; align-items: center; gap: 14px; z-index: 200;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7);
    font-family: 'JetBrains Mono', monospace;
  }
  #bottom-bar.visible { display: flex; }
  .bb-label { font-size: 11px; color: var(--text3); }
  .bb-bar { width: 110px; background: var(--surface3); border-radius: 999px; height: 5px; overflow: hidden; }
  .bb-fill { height: 100%; border-radius: 999px; background: linear-gradient(90deg, #1f6feb, #58a6ff, #39d353); transition: width 0.5s; }
  .bb-frac { font-size: 12px; color: var(--text2); font-weight: 600; }
  .bb-pct  { font-size: 14px; color: var(--accent); font-weight: 700; }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    #stats-row { grid-template-columns: repeat(2,1fr); }
    #step-grid { grid-template-columns: 1fr; }
    .q-table th:nth-child(4), .q-table td:nth-child(4) { display: none; }
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div style="display:flex;align-items:center;gap:12px">
    <button id="back-btn" onclick="showGrid()">← All Steps</button>
    <div class="logo">
      <div class="logo-icon">🎯</div>
      <div>
        <div class="logo-text" id="header-title">Striver's A2Z DSA</div>
        <div class="logo-sub" id="header-sub">450+ questions · 17 steps</div>
      </div>
    </div>
  </div>
  <div class="header-progress">
    <div class="prog-bar-wrap"><div class="prog-bar-fill" id="top-prog-fill" style="width:0%"></div></div>
    <span class="prog-label" id="top-pct">0%</span>
    <span class="prog-count" id="top-count">0/442</span>
  </div>
</div>

<div id="main">

  <!-- FILTER BAR -->
  <div id="filter-bar">
    <div class="search-wrap">
      <input id="search-input" placeholder="Search any question…" oninput="handleSearch()" autocomplete="off"/>
    </div>
    <div class="filter-group" id="diff-filters">
      <button class="fbtn active-all" data-diff="All"     onclick="setDiff(this,'All')">All</button>
      <button class="fbtn" data-diff="Easy"     onclick="setDiff(this,'Easy')">Easy</button>
      <button class="fbtn" data-diff="Medium"   onclick="setDiff(this,'Medium')">Medium</button>
      <button class="fbtn" data-diff="Hard"     onclick="setDiff(this,'Hard')">Hard</button>
      <button class="fbtn" data-diff="Pattern"  onclick="setDiff(this,'Pattern')">Pattern</button>
    </div>
    <div class="filter-group" id="plat-filters">
      <button class="fbtn active-plat-all" data-plat="All"       onclick="setPlat(this,'All')">All</button>
      <button class="fbtn" data-plat="LeetCode"  onclick="setPlat(this,'LeetCode')">LC</button>
      <button class="fbtn" data-plat="GFG"        onclick="setPlat(this,'GFG')">GFG</button>
      <button class="fbtn" data-plat="CN"         onclick="setPlat(this,'CN')">CN</button>
    </div>
    <button class="fbtn" id="undone-btn" onclick="toggleUndone()">📌 Undone</button>
    <button class="fbtn" id="reset-btn" onclick="resetAll()">✕ Reset</button>
  </div>

  <!-- STATS ROW -->
  <div id="stats-row">
    <div class="stat-card">
      <div class="stat-num" style="color:#58a6ff" id="s-solved">0</div>
      <div class="stat-lbl">Solved</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:#f85149" id="s-remain">442</div>
      <div class="stat-lbl">Remaining</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:#e3b341" id="s-total">442</div>
      <div class="stat-lbl">Total</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" style="color:#3fb950" id="s-steps">0/17</div>
      <div class="stat-lbl">Steps Done</div>
    </div>
  </div>

  <!-- STEP GRID -->
  <div id="step-grid"></div>

  <!-- STEP DETAIL -->
  <div id="step-detail"></div>

  <!-- SEARCH RESULTS -->
  <div id="search-results">
    <div class="sr-header" id="sr-header"></div>
    <div id="sr-table-wrap"></div>
  </div>

</div>

<!-- BOTTOM BAR -->
<div id="bottom-bar">
  <span class="bb-label">Progress</span>
  <div class="bb-bar"><div class="bb-fill" id="bb-fill" style="width:0%"></div></div>
  <span class="bb-frac" id="bb-frac">0/442</span>
  <span class="bb-pct"  id="bb-pct">0%</span>
</div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const STEPS = [
 {
  step:1, title:"Learn the Basics", icon:"⚡", color:"#ffa657",

   {sub:"Things to Know in C++ / Java / Python", qs:[

    {id:2, name:"Data Types in Programming", lc:"", gfg:"data-types-in-c-with-examples", cn:""},
    {id:3, name:"If-Else Statements", lc:"", gfg:"decision-making-c-c-else-else-ladder-nested", cn:""},
    {id:4, name:"Switch Statement", lc:"", gfg:"switch-statement-cc", cn:""},
    {id:5, name:"Arrays and Strings", lc:"", gfg:"arrays-in-java-javatpoint", cn:""},
    {id:6, name:"For Loops and While Loops", lc:"", gfg:"loops-in-java", cn:""},
    {id:7, name:"Functions – Pass by Value / Reference", lc:"", gfg:"functions-in-c", cn:""},
    {id:8, name:"Time & Space Complexity Basics", lc:"", gfg:"analysis-of-algorithms-set-1-asymptotic-analysis", cn:""},
   ]},
   {sub:"Pattern Printing – Build Logical Thinking", qs:[

const SK = 'striver_a2z_html_v1';
let done = new Set(JSON.parse(localStorage.getItem(SK) || '[]'));
let currentStep = null;
let filterDiff = 'All';
let filterPlat = 'All';
let filterUndone = false;

const totalQ = STEPS.reduce((a,s)=>a+s.sections.reduce((b,sec)=>b+sec.qs.length,0),0);

function saveDone() { localStorage.setItem(SK, JSON.stringify([...done])); }

function toggle(id, el) {
  if (done.has(id)) done.delete(id); else done.add(id);
  saveDone();
  updateAll();
  const row = document.getElementById('qrow-'+id);
  if (row) row.classList.toggle('done', done.has(id));
  const cb = document.getElementById('cb-'+id);
  if (cb) cb.checked = done.has(id);
}

// ─────────────────────────────────────────────
// PROGRESS
// ─────────────────────────────────────────────
function updateAll() {
  const n = done.size, pct = Math.round(n/totalQ*100);
  document.getElementById('top-prog-fill').style.width = pct+'%';
  document.getElementById('top-pct').textContent = pct+'%';
  document.getElementById('top-count').textContent = n+'/'+totalQ;
  document.getElementById('s-solved').textContent = n;
  document.getElementById('s-remain').textContent = totalQ - n;
  document.getElementById('s-total').textContent = totalQ;
  const stepsDone = STEPS.filter(s=>s.sections.reduce((a,sec)=>a+sec.qs.filter(q=>done.has(q.id)).length,0)===s.sections.reduce((a,sec)=>a+sec.qs.length,0)).length;
  document.getElementById('s-steps').textContent = stepsDone+'/17';
  const bb = document.getElementById('bottom-bar');
  if (n > 0) {
    bb.classList.add('visible');
    document.getElementById('bb-fill').style.width = pct+'%';
    document.getElementById('bb-frac').textContent = n+'/'+totalQ;
    document.getElementById('bb-pct').textContent = pct+'%';
  } else { bb.classList.remove('visible'); }
  // update step cards
  STEPS.forEach(s => {
    const card = document.getElementById('sc-'+s.step);
    if (!card) return;
    const tot = s.sections.reduce((a,sec)=>a+sec.qs.length,0);
    const comp = s.sections.reduce((a,sec)=>a+sec.qs.filter(q=>done.has(q.id)).length,0);
    const p = Math.round(comp/tot*100);
    const fill = card.querySelector('.sc-bar-fill');
    if (fill) fill.style.width = p+'%';
    const pctEl = card.querySelector('.sc-pct');
    if (pctEl) pctEl.textContent = p+'%';
    const numsEl = card.querySelector('.sc-prog-nums');
    if (numsEl) numsEl.textContent = comp+' / '+tot;
    if (comp===tot) { card.classList.add('complete'); const t=card.querySelector('.sc-trophy'); if(t)t.textContent='🏆'; }
    else { card.classList.remove('complete'); const t=card.querySelector('.sc-trophy'); if(t)t.textContent=''; }
  });
  // update step header bar if in step view
  if (currentStep) {
    const s = STEPS.find(x=>x.step===currentStep);
    if (s) {
      const tot = s.sections.reduce((a,sec)=>a+sec.qs.length,0);
      const comp = s.sections.reduce((a,sec)=>a+sec.qs.filter(q=>done.has(q.id)).length,0);
      const p = Math.round(comp/tot*100);
      const shf = document.querySelector('.sh-bar-fill');
      if (shf) { shf.style.width=p+'%'; }
      const spc = document.querySelector('.sh-pct');
      if (spc) { spc.textContent=p+'%'; spc.style.color=s.color; }
      const shc = document.querySelector('.sh-count');
      if (shc) shc.textContent=comp+'/'+tot+' completed';
    }
  }
  // reset btn
  document.getElementById('reset-btn').classList.toggle('visible', n>0);
}

function buildLink(q) {
  const links = [];
  if (q.lc) links.push(`<a class="q-link lc" href="https://leetcode.com/problems/${isNaN(q.lc)?q.lc:lcSlug(q.lc)}/" target="_blank">LC ↗</a>`);
  if (q.gfg) links.push(`<a class="q-link gfg" href="https://www.geeksforgeeks.org/problems/${q.gfg}/" target="_blank">GFG ↗</a>`);
  if (q.cn) links.push(`<a class="q-link cn" href="${q.cn}" target="_blank">CN ↗</a>`);
  return links.join('');
}

        <div class="sc-trophy">${pct===100?'🏆':''}</div>
      </div>
      <div class="sc-prog-row">
        <span class="sc-prog-nums">${comp} / ${tot}</span>
        <span class="sc-pct" style="color:${s.color}">${pct}%</span>
      </div>
      <div class="sc-bar"><div class="sc-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>
      <div class="sc-tags">${tags}</div>
    </div>`;
  }).join('');
}

// ─────────────────────────────────────────────
// SHOW STEP
// ─────────────────────────────────────────────
function showStep(stepNum) {
  currentStep = stepNum;
  const s = STEPS.find(x=>x.step===stepNum);
  const tot = s.sections.reduce((a,sec)=>a+sec.qs.length,0);
  const comp = s.sections.reduce((a,sec)=>a+sec.qs.filter(q=>done.has(q.id)).length,0);
  const pct = Math.round(comp/tot*100);

  document.getElementById('step-grid').style.display = 'none';
  document.getElementById('stats-row').style.display = 'none';
  document.getElementById('step-detail').style.display = 'block';
  document.getElementById('search-results').classList.remove('visible');
  document.getElementById('back-btn').style.display = 'flex';
  document.getElementById('header-title').textContent = `Step ${s.step}: ${s.title}`;
  document.getElementById('header-sub').textContent = `${comp}/${tot} questions`;

  const sections = s.sections.map((sec, si) => {
    const secDone = sec.qs.filter(q=>done.has(q.id)).length;
    const sp = Math.round(secDone/sec.qs.length*100);
    const rows = sec.qs.map((q,qi) => {
      const diff = q.diff || DIFF_MAP[q.id] || 'Medium';
      const isDone = done.has(q.id);
      return `<tr class="q-row${isDone?' done':''}" id="qrow-${q.id}" onclick="toggle(${q.id})">
        <td class="q-check"><input type="checkbox" id="cb-${q.id}" ${isDone?'checked':''} onclick="event.stopPropagation();" onchange="toggle(${q.id})"/></td>
        <td class="q-num">${qi+1}</td>
        <td><span class="q-name">${q.name}</span></td>
        <td>${buildLink(q)}</td>
        <td><span class="diff-chip diff-${diff}"><span class="diff-dot"></span>${diff}</span></td>
      </tr>`;
    }).join('');
    return `<div class="section-block">
      <div class="section-head${si===0?' open':''}" onclick="toggleSec(this)">
        <div class="sh-left">
          <span class="sh-arrow${si===0?' open':''}">▶</span>
          <span class="sec-name">${sec.sub}</span>
          <span class="sec-count-badge">${sec.qs.length}</span>
        </div>
        <div class="sh-right">
          <span class="sec-done-label${secDone===sec.qs.length?' all':''}">${secDone}/${sec.qs.length}</span>
          <div class="sec-mini-bar"><div class="sec-mini-fill" style="width:${sp}%;background:${s.color}"></div></div>
        </div>
      </div>
      <div class="sec-body" style="display:${si===0?'block':'none'}">
        <table class="q-table">
          <thead><tr>
            <th class="center" style="width:38px">✓</th>
            <th style="width:36px">#</th>
            <th>Question</th>
            <th style="width:140px">Links</th>
            <th style="width:96px">Difficulty</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
  }).join('');

  document.getElementById('step-detail').innerHTML = `
    <div class="step-header" style="--step-color:${s.color}">
      <div class="sh-icon">${s.icon}</div>
      <div class="sh-info">
        <div class="sh-title">Step ${s.step} — ${s.title}</div>
        <div class="sh-sub">
          <span class="sh-count">${comp}/${tot} completed</span>
          <div class="sh-bar-wrap"><div class="sh-bar-fill" style="width:${pct}%;background:${s.color}"></div></div>
          <span class="sh-pct" style="color:${s.color}">${pct}%</span>
        </div>
      </div>
      ${pct===100?'<span style="font-size:24px">🏆</span>':''}
    </div>
    ${sections}
  `;
}

function toggleSec(header) {
  const body = header.nextElementSibling;
  const arrow = header.querySelector('.sh-arrow');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  header.classList.toggle('open', !isOpen);
  arrow.classList.toggle('open', !isOpen);
}

function showGrid() {
  currentStep = null;
  document.getElementById('step-grid').style.display = 'grid';
  document.getElementById('stats-row').style.display = 'grid';
  document.getElementById('step-detail').style.display = 'none';
  document.getElementById('step-detail').innerHTML = '';
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('header-title').textContent = "Striver's A2Z DSA";
  document.getElementById('header-sub').textContent = '450+ questions · 17 steps';
  handleSearch();
}

// ─────────────────────────────────────────────
// SEARCH / FILTER
// ─────────────────────────────────────────────
function handleSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const isFiltered = q || filterDiff !== 'All' || filterPlat !== 'All' || filterUndone;

  if (!isFiltered) {
    document.getElementById('search-results').classList.remove('visible');
    if (!currentStep) {
      document.getElementById('step-grid').style.display = 'grid';
      document.getElementById('stats-row').style.display = 'grid';
    }
    return;
  }

  if (!currentStep) {
    document.getElementById('step-grid').style.display = 'none';
    document.getElementById('stats-row').style.display = 'none';
  }

  const allQ = STEPS.flatMap(s=>s.sections.flatMap(sec=>sec.qs.map(x=>({...x,stepId:s.step,stepTitle:s.title,stepColor:s.color,diff:x.diff||DIFF_MAP[x.id]||'Medium'}))));
  const filtered = allQ.filter(x => {
    if (q && !x.name.toLowerCase().includes(q)) return false;
    if (filterDiff !== 'All' && x.diff !== filterDiff) return false;
    if (filterPlat !== 'All') {
      const has = (filterPlat==='LeetCode'&&x.lc)||(filterPlat==='GFG'&&x.gfg)||(filterPlat==='CN'&&x.cn);
      if (!has) return false;
    }
    if (filterUndone && done.has(x.id)) return false;
    return true;
  });

  document.getElementById('sr-header').innerHTML = `Found <strong>${filtered.length}</strong> question${filtered.length!==1?'s':''}`;

  if (filtered.length === 0) {
    document.getElementById('sr-table-wrap').innerHTML = '<div class="sr-empty">No questions match your filters.</div>';
  } else {
    const rows = filtered.map((x,i) => {
      const isDone = done.has(x.id);
      return `<tr class="q-row${isDone?' done':''}" id="qrow-${x.id}" onclick="toggle(${x.id})">
        <td class="q-check"><input type="checkbox" id="cb-${x.id}" ${isDone?'checked':''} onclick="event.stopPropagation();" onchange="toggle(${x.id})"/></td>
        <td class="q-num">${i+1}</td>
        <td><span class="q-name">${x.name}</span><br><span style="font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace">Step ${x.stepId} · ${x.stepTitle}</span></td>
        <td>${buildLink(x)}</td>
        <td><span class="diff-chip diff-${x.diff}"><span class="diff-dot"></span>${x.diff}</span></td>
      </tr>`;
    }).join('');
    document.getElementById('sr-table-wrap').innerHTML = `
      <table class="q-table">
        <thead><tr>
          <th class="center" style="width:38px">✓</th>
          <th style="width:36px">#</th>
          <th>Question</th>
          <th style="width:140px">Links</th>
          <th style="width:96px">Difficulty</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }
  document.getElementById('search-results').classList.add('visible');
}

function setDiff(btn, val) {
  filterDiff = val;
  document.querySelectorAll('#diff-filters .fbtn').forEach(b => {
    b.className = 'fbtn';
    if (b.dataset.diff === val) b.className = 'fbtn active-'+val.toLowerCase();
  });
  handleSearch();
}
function setPlat(btn, val) {
  filterPlat = val;
  document.querySelectorAll('#plat-filters .fbtn').forEach(b => {
    b.className = 'fbtn';
    if (b.dataset.plat === val) {
      b.className = 'fbtn ' + (val==='All'?'active-plat-all':val==='LeetCode'?'active-lc':val==='GFG'?'active-gfg':'active-cn');
    }
  });
  handleSearch();
}
function toggleUndone() {
  filterUndone = !filterUndone;
  document.getElementById('undone-btn').classList.toggle('active-undone', filterUndone);
  handleSearch();
}
function resetAll() {
  if (!confirm('Reset all progress?')) return;
  done.clear(); saveDone(); updateAll();
  document.querySelectorAll('.q-row.done').forEach(r=>r.classList.remove('done'));
  document.querySelectorAll('input[type=checkbox]').forEach(c=>c.checked=false);
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
renderGrid();
updateAll();
</script>
</body>
</html>
